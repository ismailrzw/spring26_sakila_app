name: Fixed CI Pipeline

on:
  push:
    branches: [main] # Fixed Error 1 & 4 (Indentation and list format)

jobs: # Fixed Error 3 (Job Indentation)
  test:
    runs-on: ubuntu-latest # Fixed Error 2 (Invalid runner label)
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Tests
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: docker build -t myapp .

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build] # Fixed Error 5 (Missing dependency on build)
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Deploying to production..."