name: Fixed CI Pipeline
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
      - name: Run Tests
        run: echo "Tests Passing"
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Build Image
        run: echo "Build Passing"
  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deploy Passing"