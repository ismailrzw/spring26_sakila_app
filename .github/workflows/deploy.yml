name: CD Deployment Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Simulate Staging Deployment
        run: |
          echo "Deploying to STAGING..."
          echo "DB_HOST=${{ vars.DB_HOST_STAGING }}"
          echo "Running Docker Image: sakila-app:staging"

      - name: Generate Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Notify Staging
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Simulate Production Deployment
        run: |
          echo "Deploying to PRODUCTION..."
          echo "Status: Performing zero-downtime deployment."

      - name: Create Version Tag
        id: tagger
        run: echo "VERSION=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tagger.outputs.VERSION }}
          name: Release ${{ steps.tagger.outputs.VERSION }}
          body: "Automated production release."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Production
        run: echo "Slack notification: Deployment to production successful"