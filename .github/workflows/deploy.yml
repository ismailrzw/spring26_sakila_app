name: CD Deployment Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Must match the 'name' in your ci-pipeline.yml
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    # This ensures it ONLY runs if the CI Pipeline was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Simulate Staging
        run: |
          echo "Deploying to STAGING..."
          echo "Status: Success"
      - name: Generate Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production # This triggers the manual approval gate
    steps:
      - uses: actions/checkout@v4
      - name: Create Version Tag
        id: tagger
        run: echo "VERSION=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tagger.outputs.VERSION }}
          name: Release ${{ steps.tagger.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify
        run: echo "Slack notification: Deployment to production successful"